<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>義朵朵pasta - 顧客口味服務調查表</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #fffaf0;
      --white: #ffffff;
      --orange-50: #fff7ed;
      --orange-100: #ffedd5;
      --orange-500: #f97316;
      --orange-600: #ea580c;
      --green-500: #22c55e;
      --green-600: #16a34a;
      --gray-100: #f3f4f6;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --shadow: 0 20px 30px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 16px 30px rgba(0, 0, 0, 0.16);
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      -webkit-tap-highlight-color: transparent;
    }

    .card {
      width: 100%;
      max-width: 448px;
      background: var(--white);
      border: 1px solid var(--orange-100);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 40px;
    }

    .header {
      background: var(--orange-500);
      color: var(--white);
      padding: 32px 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0 0 4px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1.3;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: #ffedd5;
      opacity: 0.9;
      line-height: 1.5;
    }

    .form {
      padding: 24px;
    }

    .form > * + * {
      margin-top: 24px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .label-sm,
    .label-lg {
      display: block;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .label-sm {
      color: var(--gray-600);
      font-size: 14px;
    }

    .label-lg {
      color: var(--gray-700);
      font-size: 18px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 2px solid var(--gray-100);
      border-radius: 16px;
      padding: 16px 14px;
      background: #f9fafb;
      color: var(--gray-700);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .select {
      min-height: 56px;
    }

    .input[type="date"] {
      min-height: 56px;
      font-size: 14px;
    }

    .score-input {
      padding: 18px 16px;
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      color: var(--orange-600);
      background: var(--orange-50);
      min-height: 68px;
    }

    .textarea {
      resize: none;
      min-height: 120px;
      line-height: 1.6;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      border-color: var(--orange-500);
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
      outline: none;
      background: var(--white);
    }

    hr {
      border: none;
      border-top: 1px solid var(--gray-100);
      margin: 0;
    }

    .submit-btn {
      width: 100%;
      background: var(--green-500);
      color: var(--white);
      border: none;
      border-radius: 16px;
      padding: 18px 16px;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      min-height: 64px;
      box-shadow: var(--shadow-lg);
      transition: background-color 0.2s ease, transform 0.08s ease;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .submit-btn:hover {
      background: var(--green-600);
    }

    .submit-btn:active {
      transform: scale(0.95);
    }

    .submit-btn svg {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      display: block;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 8px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }

      .card {
        border-radius: 20px;
      }

      .header {
        padding: 28px 20px;
      }

      .header h1 {
        font-size: 28px;
      }

      .form {
        padding: 20px;
      }

      .grid-2 {
        gap: 12px;
      }

      .submit-btn {
        font-size: 20px;
        padding: 16px 14px;
      }

      .score-input {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>義朵朵pasta</h1>
      <p>感謝您的寶貴建議</p>
    </div>

    <form id="surveyForm" class="form">
      <div class="grid-2">
        <div>
          <label class="label-sm">👤 性別</label>
          <select name="gender" required class="select">
            <option value="" disabled selected>請選擇</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <div>
          <label class="label-sm">🎂 年齡</label>
          <select name="ageGroup" required class="select">
            <option value="" disabled selected>請選擇</option>
            <option value="20歲以下">20歲以下</option>
            <option value="21-50歲">21-50歲</option>
            <option value="51歲以上">51歲以上</option>
          </select>
        </div>
      </div>

      <div>
        <label class="label-sm">📍 用餐分店</label>
        <select name="branch" required class="select" style="font-size: 18px;">
          <option value="" disabled selected>請點擊選擇分店</option>
          <option value="屏東中正店">屏東中正店</option>
          <option value="屏東福建店">屏東福建店</option>
          <option value="高雄文化店">高雄文化店</option>
        </select>
      </div>

      <div class="grid-2">
        <div>
          <label class="label-sm">⏰ 時段</label>
          <select name="mealTime" required class="select">
            <option value="" disabled selected>請選擇</option>
            <option value="中午">中午</option>
            <option value="晚上">晚上</option>
          </select>
        </div>
        <div>
          <label class="label-sm">📅 日期</label>
          <input type="date" id="visitDate" name="visitDate" required class="input" />
        </div>
      </div>

      <hr />

      <div>
        <label class="label-lg">⭐ 滿意評分 (請輸入 0-5 數字)</label>
        <input
          type="number"
          name="score"
          min="0"
          max="5"
          required
          placeholder="點我輸入 0-5 數字"
          class="input score-input"
        />
      </div>

      <div>
        <label class="label-lg">💬 餐點建議或問題</label>
        <textarea
          id="feedback"
          name="feedback"
          rows="4"
          required
          placeholder="請寫下您的餐點名稱或想對我們說的話..."
          class="textarea"
        ></textarea>
      </div>

      <button type="submit" class="submit-btn">
        <svg fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M24 10.304c0-4.587-4.805-8.304-10.714-8.304-5.908 0-10.714 3.717-10.714 8.304 0 4.108 3.812 7.545 8.97 8.193.349.075.824.23 1.055.526.24.308.158.791.077 1.101l-.31 1.325c-.094.403-.438 1.578 1.89 1.101 2.329-.476 12.554-7.391 12.756-12.246zm-16.711 3.518c-.287 0-.52-.233-.52-.52V8.347c0-.287.233-.52.52-.52s.52.233.52.52v4.955c0 .287-.233.52-.52.52zm3.322 0c-.066 0-.131-.013-.193-.039l-2.029-.861c-.266-.113-.389-.42-.276-.686.113-.266.42-.389.686-.276l1.292.548V8.347c0-.287.233-.52.52-.52s.52.233.52.52v4.955c0 .287-.233.52-.52.52zm4.331-1.04c0 .287-.233.52-.52.52H15.45c-.287 0-.52-.233-.52-.52V8.347c0-.287.233-.52.52-.52s.52.233.52.52v2.327h1.661c.287 0 .52.233.52.52v1.047zm3.189 0c0 .287-.233.52-.52.52H15.45c-.287 0-.52-.233-.52-.52V8.347c0-.287.233-.52.52-.52s.52.233.52.52v1.04h1.661c.287 0 .52.233.52.52v.78c0 .287-.233.52-.52.52h-1.661v.748h1.661c.287 0 .52.233.52.52v.78z"/>
        </svg>
        傳送至官方 LINE
      </button>
      <p class="hint">點擊按鈕後，請在 LINE 對話框按「傳送」</p>
    </form>
  </div>

  <script>
    document.getElementById("visitDate").valueAsDate = new Date();

    document.getElementById("surveyForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const formData = new FormData(this);
      const gender = formData.get("gender");
      const ageGroup = formData.get("ageGroup");
      const branch = formData.get("branch");
      const mealTime = formData.get("mealTime");
      const visitDate = formData.get("visitDate");
      const score = formData.get("score");
      const feedback = formData.get("feedback");

      const message =
        `【義朵朵回饋調查】\n` +
        `👤 客人：${gender} / ${ageGroup}\n` +
        `📍 分店：${branch}\n` +
        `📅 日期：${visitDate}\n` +
        `⏰ 時段：${mealTime}\n` +
        `⭐ 評分：${score} / 5 分\n` +
        `💬 內容：${feedback}`;

      const lineId = "@716vqcqy";
      const encodedMsg = encodeURIComponent(message);
      const lineUrl = `https://line.me/R/oaMessage/${lineId}/?${encodedMsg}`;

      window.location.href = lineUrl;
    });
  </script>
</body>
</html>

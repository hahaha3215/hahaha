<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>義朵朵pasta - 顧客口味服務調查表</title>
    <style>
        body {
            font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #fffaf0;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: 0;
        }

        /* 避免手機點擊陰影 */
        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
        }

        .min-h-screen { min-height: 100vh; }
        .py-6 { padding-top: 1.5rem; padding-bottom: 1.5rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .flex { display: flex; }
        .justify-center { justify-content: center; }
        .items-start { align-items: flex-start; }

        .bg-white { background-color: #ffffff; }
        .w-full { width: 100%; }
        .max-w-md { max-width: 28rem; }
        .rounded-3xl { border-radius: 1.5rem; }
        .shadow-xl { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); }
        .overflow-hidden { overflow: hidden; }
        .border { border-width: 1px; border-style: solid; }
        .border-orange-100 { border-color: #ffedd5; }
        .mb-10 { margin-bottom: 2.5rem; }

        .bg-orange-500 { background-color: #f97316; }
        .text-white { color: #ffffff; }
        .p-8 { padding: 2rem; }
        .text-center { text-align: center; }
        .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
        .font-bold { font-weight: 700; }
        .tracking-widest { letter-spacing: 0.1em; }
        .mb-1 { margin-bottom: 0.25rem; }
        .text-orange-100 { color: #ffedd5; }
        .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
        .opacity-90 { opacity: 0.9; }

        .p-6 { padding: 1.5rem; }
        .space-y-6 > * + * { margin-top: 1.5rem; }

        .grid { display: grid; }
        .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .gap-4 { gap: 1rem; }

        .block { display: block; }
        .text-gray-600 { color: #4b5563; }
        .mb-2 { margin-bottom: 0.5rem; }
        .font-medium { font-weight: 500; }

        .border-2 { border-width: 2px; border-style: solid; }
        .border-gray-100 { border-color: #f3f4f6; }
        .rounded-2xl { border-radius: 1rem; }
        .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .bg-gray-50 { background-color: #f9fafb; }
        .appearance-none {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
        .text-gray-700 { color: #374151; }

        .text-xs { font-size: 0.75rem; line-height: 1rem; }
        .text-gray-400 { color: #9ca3af; }
        .mt-3 { margin-top: 0.75rem; }

        .pt-2 { padding-top: 0.5rem; }
        .submit-btn {
            width: 100%;
            background-color: #22c55e;
            color: #ffffff;
            font-weight: 700;
            padding: 1.25rem 1rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            font-size: 1.25rem;
            line-height: 1.75rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            border: none;
            cursor: pointer;
        }
        .submit-btn:hover { background-color: #16a34a; }
        .submit-btn:active {
            transform: scale(0.96);
            filter: brightness(0.9);
        }

        .w-7 { width: 1.75rem; }
        .h-7 { height: 1.75rem; }

        hr.border-gray-100 {
            border: 0;
            border-top: 1px solid #f3f4f6;
            margin: 0;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #f97316 !important;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2) !important;
            outline: none;
        }

        .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .text-orange-600 { color: #ea580c; }
        .text-center { text-align: center; }
        .py-5 { padding-top: 1.25rem; padding-bottom: 1.25rem; }
        .resize-none { resize: none; }

        @media (max-width: 640px) {
            .max-w-md { max-width: 28rem; }
        }
    </style>
</head>
<body class="min-h-screen py-6 px-4 flex justify-center items-start">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl overflow-hidden border border-orange-100 mb-10">
        <!-- 頂部視覺 -->
        <div class="bg-orange-500 text-white p-8 text-center">
            <h1 class="text-3xl font-bold tracking-widest mb-1">義朵朵pasta</h1>
            <p class="text-orange-100 text-sm opacity-90">感謝您分享用餐心情</p>
        </div>

        <form id="surveyForm" class="p-6 space-y-6">
            
            <!-- 客人基本資料 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-600 font-bold mb-2 text-sm font-medium">👤 性別</label>
                    <select name="gender" required class="w-full border-2 border-gray-100 rounded-2xl px-3 py-4 bg-gray-50 appearance-none">
                        <option value="" disabled selected>請選擇</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-2 text-sm font-medium">🎂 年齡</label>
                    <select name="ageGroup" required class="w-full border-2 border-gray-100 rounded-2xl px-3 py-4 bg-gray-50 appearance-none">
                        <option value="" disabled selected>請選擇</option>
                        <option value="20歲以下">20歲以下</option>
                        <option value="21-50歲">21-50歲</option>
                        <option value="51歲以上">51歲以上</option>
                    </select>
                </div>
            </div>

            <!-- 分店選擇 -->
            <div>
                <label class="block text-gray-600 font-bold mb-2 text-sm font-medium">📍 用餐分店</label>
                <select name="branch" required class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 bg-gray-50 text-lg appearance-none">
                    <option value="" disabled selected>請選擇分店</option>
                    <option value="屏東中正店">屏東中正店</option>
                    <option value="屏東福建店">屏東福建店</option>
                    <option value="高雄文化店">高雄文化店</option>
                </select>
            </div>

            <!-- 日期與時段 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-600 font-bold mb-2 text-sm font-medium">⏰ 時段</label>
                    <select name="mealTime" required class="w-full border-2 border-gray-100 rounded-2xl px-3 py-4 bg-gray-50 appearance-none">
                        <option value="" disabled selected>請選擇</option>
                        <option value="中午">中午</option>
                        <option value="晚上">晚上</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-2 text-sm font-medium">📅 日期</label>
                    <input type="date" id="visitDate" name="visitDate" required
                        class="w-full border-2 border-gray-100 rounded-2xl px-3 py-4 bg-gray-50 text-sm">
                </div>
            </div>

            <hr class="border-gray-100">

            <!-- 滿意度：手動輸入 -->
            <div>
                <label class="block text-gray-700 font-bold mb-2 text-lg">⭐ 滿意評分 (請填 0-5)</label>
                <input type="number" name="score" min="0" max="5" required placeholder="請輸入 0 到 5 之間的數字"
                    class="w-full border-2 border-gray-100 rounded-2xl px-4 py-5 text-4xl font-bold text-center bg-orange-50 text-orange-600">
            </div>

            <!-- 餐點與建議 -->
            <div>
                <label class="block text-gray-700 font-bold mb-2 text-lg">💬 餐點建議或問題</label>
                <textarea id="feedback" name="feedback" rows="4" required placeholder="請寫下您的餐點名稱或建議..."
                    class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 bg-gray-50 resize-none"></textarea>
            </div>

            <!-- 送出按鈕 -->
            <div class="pt-2">
                <button type="submit" 
                    class="submit-btn w-full bg-green-500 hover:bg-green-600 text-white font-bold py-5 rounded-2xl shadow-xl transition-all text-xl flex justify-center items-center gap-2">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M24 10.304c0-4.587-4.805-8.304-10.714-8.304-5.908 0-10.714 3.717-10.714 8.304 0 4.108 3.812 7.545 8.97 8.193.349.075.824.23 1.055.526.24.308.158.791.077 1.101l-.31 1.325c-.094.403-.438 1.578 1.89 1.101 2.329-.476 12.554-7.391 12.756-12.246zm-16.711 3.518c-.287 0-.52-.233-.52-.52V8.347c0-.287.233-.52.52-.52s.52.233.52.52v4.955c0 .287-.233.52-.52.52zm3.322 0c-.066 0-.131-.013-.193-.039l-2.029-.861c-.266-.113-.389-.42-.276-.686.113-.266.42-.389.686-.276l1.292.548V8.347c0-.287.233-.52.52-.52s.52.233.52.52v4.955c0 .287-.233.52-.52.52zm4.331-1.04c0 .287-.233.52-.52.52h-2.181c-.287 0-.52-.233-.52-.52V8.347c0-.287.233-.52.52-.52s.52.233.52.52v2.327h1.661c.287 0 .52.233.52.52v1.047zm3.189 0c0 .287-.233.52-.52.52H15.45c-.287 0-.52-.233-.52-.52V8.347c0-.287.233-.52.52-.52s.52.233.52.52v1.04h1.661c.287 0 .52.233.52.52v.78c0 .287-.233.52-.52.52h-1.661v.748h1.661c.287 0 .52.233.52.52v.78z"/></svg>
                    發送至官方 LINE
                </button>
                <p class="text-center text-xs text-gray-400 mt-3">點擊後會開啟 LINE，直接按「傳送」即可完成！</p>
            </div>
        </form>
    </div>

    <script>
        // 設定今天的日期為預設值
        document.getElementById('visitDate').valueAsDate = new Date();

        document.getElementById('surveyForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 取得表單內容
            const formData = new FormData(this);
            const gender = formData.get('gender');
            const ageGroup = formData.get('ageGroup');
            const branch = formData.get('branch');
            const mealTime = formData.get('mealTime');
            const visitDate = formData.get('visitDate');
            const score = formData.get('score');
            const feedback = formData.get('feedback');

            // 格式化訊息文字
            const message = `【義朵朵回饋調查】\n` +
                            `👤 客人：${gender} / ${ageGroup}\n` +
                            `📍 分店：${branch}\n` +
                            `📅 日期：${visitDate}\n` +
                            `⏰ 時段：${mealTime}\n` +
                            `⭐ 評分：${score} / 5 分\n` +
                            `💬 內容：\n${feedback}`;

            // 您的官方 LINE ID
            const lineId = '@109npnhy'; 
            
            // 使用 LINE URL Scheme (oaMessage) 帶入文字
            const encodedMsg = encodeURIComponent(message);
            const lineUrl = `https://line.me/R/oaMessage/${lineId}/?${encodedMsg}`;

            // 跳轉至 LINE
            window.location.href = lineUrl;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>義朵朵pasta - 顧客滿意度調查</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --orange-50: #fff7ed;
      --orange-100: #ffedd5;
      --orange-500: #f97316;
      --orange-600: #ea580c;
      --green-100: #dcfce7;
      --green-500: #22c55e;
      --yellow-400: #facc15;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --red-500: #ef4444;
      --white: #ffffff;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      -webkit-tap-highlight-color: transparent;
      background: var(--orange-50);
      min-height: 100vh;
      padding: 32px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 448px;
      background: var(--white);
      border: 1px solid var(--orange-100);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.08);
    }

    .header {
      background: var(--orange-500);
      color: var(--white);
      padding: 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--orange-100);
      line-height: 1.5;
    }

    .form {
      padding: 24px;
    }

    .form > * + * {
      margin-top: 24px;
    }

    .label {
      display: block;
      color: var(--gray-700);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .required {
      color: var(--red-500);
    }

    .grid-1,
    .grid-2,
    .grid-3 {
      display: grid;
      gap: 12px;
    }

    .grid-1 {
      grid-template-columns: 1fr;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .small-text {
      font-size: 14px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--gray-100);
      margin: 0;
    }

    input[type="radio"].hidden-radio {
      display: none;
    }

    .option-label {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--white);
      color: var(--gray-700);
      transition: all 0.2s ease;
      user-select: none;
      line-height: 1.4;
      min-height: 48px;
    }

    .option-label:hover {
      background: var(--orange-50);
    }

    input[type="radio"].hidden-radio:checked + .option-label {
      background-color: var(--orange-500);
      color: var(--white);
      border-color: var(--orange-500);
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      color: var(--gray-800);
      background: var(--white);
      outline: none;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
      font-family: inherit;
    }

    .input:focus,
    .textarea:focus {
      border-color: var(--orange-500);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
    }

    .textarea {
      resize: none;
      min-height: 112px;
      line-height: 1.6;
    }

    .star-title {
      text-align: center;
    }

    .star-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .star-btn {
      background: transparent;
      border: none;
      padding: 4px;
      margin: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 10px;
      transition: transform 0.1s ease-in-out;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .star-btn:active {
      transform: scale(0.84);
    }

    .star-btn:focus-visible {
      outline: 2px solid var(--orange-500);
      outline-offset: 2px;
    }

    .star-btn svg {
      width: 48px;
      height: 48px;
      color: var(--gray-200);
      transition: color 0.2s ease;
      display: block;
      pointer-events: none;
    }

    .star-btn svg.active {
      color: var(--yellow-400);
    }

    .error-text {
      color: var(--red-500);
      font-size: 14px;
      text-align: center;
      margin-top: 8px;
      font-weight: 600;
      display: none;
      line-height: 1.5;
    }

    .error-text.show {
      display: block;
    }

    .submit-btn {
      width: 100%;
      background: var(--orange-500);
      color: var(--white);
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.24);
      transition: background-color 0.2s ease, transform 0.08s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      line-height: 1.5;
      min-height: 56px;
      white-space: normal;
      word-break: break-word;
    }

    .submit-btn:hover {
      background: var(--orange-600);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--gray-500);
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      body {
        padding: 20px 12px;
        align-items: flex-start;
      }

      .form {
        padding: 20px;
      }

      .header {
        padding: 22px 18px;
      }

      .header h1 {
        font-size: 22px;
      }

      .star-btn svg {
        width: 42px;
        height: 42px;
      }

      .grid-3 {
        gap: 6px;
      }

      .option-label {
        padding: 12px 8px;
        font-size: 13px;
      }

      .submit-btn {
        font-size: 15px;
        padding: 15px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🍝 義朵朵pasta</h1>
      <p>顧客口味服務調查表</p>
    </div>

    <form id="surveyForm" class="form">
      <div>
        <label class="label">👤 顧客性別<span class="required">*</span></label>
        <div class="grid-2">
          <div>
            <input type="radio" name="gender" id="genderMale" value="男" class="hidden-radio" required />
            <label for="genderMale" class="option-label">👨 男</label>
          </div>
          <div>
            <input type="radio" name="gender" id="genderFemale" value="女" class="hidden-radio" />
            <label for="genderFemale" class="option-label">👩 女</label>
          </div>
        </div>
      </div>

      <div>
        <label class="label">🎂 年齡層<span class="required">*</span></label>
        <div class="grid-3 small-text">
          <div>
            <input type="radio" name="ageGroup" id="age1" value="20歲以下" class="hidden-radio" required />
            <label for="age1" class="option-label">20歲以下</label>
          </div>
          <div>
            <input type="radio" name="ageGroup" id="age2" value="21-50歲" class="hidden-radio" />
            <label for="age2" class="option-label">21-50歲</label>
          </div>
          <div>
            <input type="radio" name="ageGroup" id="age3" value="51歲以上" class="hidden-radio" />
            <label for="age3" class="option-label">51歲以上</label>
          </div>
        </div>
      </div>

      <hr />

      <div>
        <label class="label">📍 用餐分店<span class="required">*</span></label>
        <div class="grid-1">
          <div>
            <input type="radio" name="branch" id="branch1" value="屏東中正店" class="hidden-radio" required />
            <label for="branch1" class="option-label">屏東中正店</label>
          </div>
          <div>
            <input type="radio" name="branch" id="branch2" value="屏東福建店" class="hidden-radio" />
            <label for="branch2" class="option-label">屏東福建店</label>
          </div>
          <div>
            <input type="radio" name="branch" id="branch3" value="高雄文化店" class="hidden-radio" />
            <label for="branch3" class="option-label">高雄文化店</label>
          </div>
        </div>
      </div>

      <div>
        <label class="label">⏰ 用餐時段<span class="required">*</span></label>
        <div class="grid-2">
          <div>
            <input type="radio" name="mealTime" id="timeNoon" value="中午" class="hidden-radio" required />
            <label for="timeNoon" class="option-label">☀️ 中午</label>
          </div>
          <div>
            <input type="radio" name="mealTime" id="timeNight" value="晚上" class="hidden-radio" />
            <label for="timeNight" class="option-label">🌙 晚上</label>
          </div>
        </div>
      </div>

      <div>
        <label class="label" for="visitDate">📅 用餐日期<span class="required">*</span></label>
        <input type="date" id="visitDate" name="visitDate" required class="input" />
      </div>

      <hr />

      <div>
        <label class="label star-title">⭐ 滿意度評分 (1-5星)<span class="required">*</span></label>
        <div class="star-container" id="starContainer">
          <button type="button" data-value="1" class="star-btn" aria-label="1 星">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
          </button>
          <button type="button" data-value="2" class="star-btn" aria-label="2 星">
            <svg fill="currentColor" viewBox="0 0 24 2

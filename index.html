<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>義朵朵pasta - 顧客口味服務調查表</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      -webkit-tap-highlight-color: transparent;
      background: #fff7ed;
      min-height: 100vh;
      padding: 32px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .page-wrap {
      width: 100%;
      max-width: 448px;
      background: #ffffff;
      border: 1px solid #ffedd5;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.08);
    }

    .header {
      background: #f97316;
      color: #ffffff;
      padding: 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: #ffedd5;
    }

    .form {
      padding: 24px;
    }

    .space-y-6 > * + * {
      margin-top: 24px;
    }

    .label {
      display: block;
      color: #374151;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .text-red {
      color: #ef4444;
    }

    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    hr {
      border: none;
      border-top: 1px solid #f3f4f6;
      margin: 0;
    }

    input[type="radio"].hidden-radio {
      display: none;
    }

    input[type="radio"].hidden-radio:checked + label {
      background-color: #f97316;
      color: #ffffff;
      border-color: #f97316;
    }

    .option-label {
      display: block;
      text-align: center;
      cursor: pointer;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 16px;
      background: #ffffff;
      color: #374151;
      transition: all 0.2s ease;
      user-select: none;
    }

    .option-label:hover {
      background: #fff7ed;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      color: #111827;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input:focus,
    .textarea:focus {
      border-color: transparent;
      box-shadow: 0 0 0 2px #f97316;
    }

    .textarea {
      resize: none;
      min-height: 110px;
      line-height: 1.6;
    }

    .star-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .star-btn {
      transition: transform 0.1s ease-in-out;
      background: transparent;
      border: none;
      outline: none;
      padding: 4px;
      cursor: pointer;
      border-radius: 8px;
    }

    .star-btn:active {
      transform: scale(0.8);
    }

    .star-btn svg {
      pointer-events: none;
      width: 48px;
      height: 48px;
      color: #d1d5db;
      transition: color 0.2s ease;
      display: block;
    }

    .star-btn svg.active {
      color: #facc15;
    }

    .error-text {
      color: #ef4444;
      font-size: 14px;
      text-align: center;
      margin-top: 8px;
      font-weight: 500;
      display: none;
    }

    .error-text.show {
      display: block;
    }

    .submit-btn {
      width: 100%;
      background: #f97316;
      color: #ffffff;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.25);
      transition: background-color 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #ea580c;
    }

    .submit-btn svg {
      width: 20px;
      height: 20px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 50;
      padding: 16px;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 384px;
      text-align: center;
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.2);
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: #dcfce7;
      color: #22c55e;
      border-radius: 9999px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 16px;
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
    }

    .modal-card h3 {
      margin: 0 0 8px;
      color: #1f2937;
      font-size: 20px;
      font-weight: 700;
    }

    .modal-card p {
      margin: 0 0 24px;
      color: #4b5563;
      line-height: 1.7;
      font-size: 15px;
    }

    .highlight {
      color: #f97316;
      font-weight: 700;
    }

    .line-btn {
      width: 100%;
      background: #22c55e;
      color: #ffffff;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .line-btn:hover {
      background: #16a34a;
    }

    @media (max-width: 480px) {
      body {
        padding: 20px 12px;
      }

      .form {
        padding: 20px;
      }

      .star-btn svg {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="header">
      <h1>🍝 義朵朵pasta</h1>
      <p>顧客口味服務調查表</p>
    </div>

    <form id="surveyForm" class="form space-y-6">
      <div>
        <label class="label">📍 今天在哪間分店用餐呢？<span class="text-red">*</span></label>
        <div class="grid-1">
          <div>
            <input type="radio" name="branch" id="branch1" value="屏東中正店" class="hidden-radio" required />
            <label for="branch1" class="option-label">屏東中正店</label>
          </div>
          <div>
            <input type="radio" name="branch" id="branch2" value="屏東福建店" class="hidden-radio" />
            <label for="branch2" class="option-label">屏東福建店</label>
          </div>
          <div>
            <input type="radio" name="branch" id="branch3" value="高雄文化店" class="hidden-radio" />
            <label for="branch3" class="option-label">高雄文化店</label>
          </div>
        </div>
      </div>

      <hr />

      <div>
        <label class="label">⏰ 用餐時段<span class="text-red">*</span></label>
        <div class="grid-2">
          <div>
            <input type="radio" name="mealTime" id="timeNoon" value="中午" class="hidden-radio" required />
            <label for="timeNoon" class="option-label">☀️ 中午</label>
          </div>
          <div>
            <input type="radio" name="mealTime" id="timeNight" value="晚上" class="hidden-radio" />
            <label for="timeNight" class="option-label">🌙 晚上</label>
          </div>
        </div>
      </div>

      <div>
        <label class="label" for="visitDate">📅 用餐日期<span class="text-red">*</span></label>
        <input type="date" id="visitDate" name="visitDate" required class="input" />
      </div>

      <hr />

      <div>
        <label class="label">⭐ 服務與餐點滿意度 (1-5星)<span class="text-red">*</span></label>
        <div class="star-container" id="starContainer">
          <button type="button" data-value="1" class="star-btn" aria-label="1 星">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
          </button>
          <button type="button" data-value="2" class="star-btn" aria-label="2 星">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
          </button>
          <button type="button" data-value="3" class="star-btn" aria-label="3 星">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
          </button>
          <button type="button" data-value="4" class="star-btn" aria-label="4 星">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
          </button>
          <button type="button" data-value="5" class="star-btn" aria-label="5 星">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
          </button>
        </div>
        <input type="hidden" id="ratingValue" name="ratingValue" />
        <p id="ratingError" class="error-text">⚠️ 請點擊星星進行評分</p>
      </div>

      <hr />

      <div>
        <label class="label" for="feedback">💬 餐點名稱與建議 / 問題<span class="text-red">*</span></label>
        <textarea
          id="feedback"
          name="feedback"
          rows="4"
          required
          placeholder="例如：白酒蛤蜊麵很好吃，但冷氣有點太冷了..."
          class="textarea"
        ></textarea>
      </div>

      <button type="submit" class="submit-btn">
        <span>提交至官方 LINE</span>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
        </svg>
      </button>
    </form>

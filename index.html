<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>義朵朵pasta - 顧客口味服務調查表</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #fffaf0;
      --white: #ffffff;
      --orange-100: #ffedd5;
      --orange-500: #f97316;
      --orange-600: #ea580c;
      --green-500: #22c55e;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --overlay: rgba(0, 0, 0, 0.7);
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      -webkit-tap-highlight-color: transparent;
    }

    .card {
      width: 100%;
      max-width: 448px;
      background: var(--white);
      border: 1px solid var(--orange-100);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 40px;
    }

    .header {
      background: var(--orange-500);
      color: var(--white);
      padding: 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1.3;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 14px;
      color: #ffedd5;
      line-height: 1.5;
    }

    .form {
      padding: 24px;
    }

    .form > * + * {
      margin-top: 24px;
    }

    .grid-2,
    .grid-1 {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-1 {
      grid-template-columns: 1fr;
    }

    .label {
      display: block;
      color: var(--gray-700);
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .label-lg {
      font-size: 18px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 2px solid var(--gray-100);
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--gray-50);
      color: var(--gray-700);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .select {
      min-height: 50px;
    }

    .input[type="date"] {
      min-height: 50px;
    }

    .score-input {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: var(--orange-500);
      min-height: 64px;
    }

    .textarea {
      resize: none;
      min-height: 120px;
      line-height: 1.6;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      border-color: var(--orange-500);
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
      background: var(--white);
    }

    hr {
      border: none;
      border-top: 1px solid var(--gray-100);
      margin: 0;
    }

    .hint {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 8px;
      text-align: center;
      line-height: 1.5;
    }

    .submit-btn {
      width: 100%;
      background: var(--orange-500);
      color: var(--white);
      font-weight: 700;
      font-size: 20px;
      border: none;
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      transition: transform 0.08s ease, background-color 0.2s ease;
      cursor: pointer;
      min-height: 62px;
      line-height: 1.4;
    }

    .submit-btn:active {
      transform: scale(0.98);
      background-color: var(--orange-600);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 24px;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 320px;
      background: var(--white);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.2);
    }

    .success-icon {
      color: var(--green-500);
      margin-bottom: 16px;
    }

    .success-icon svg {
      width: 64px;
      height: 64px;
      display: block;
      margin: 0 auto;
    }

    .modal-card h3 {
      margin: 0 0 8px;
      color: var(--gray-800);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
    }

    .modal-card p {
      margin: 0 0 24px;
      color: var(--gray-500);
      font-size: 14px;
      line-height: 1.7;
    }

    .highlight {
      color: var(--orange-600);
      font-weight: 700;
    }

    .line-btn {
      width: 100%;
      background: var(--green-500);
      color: var(--white);
      font-weight: 700;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(34, 197, 94, 0.22);
      transition: transform 0.08s ease, filter 0.2s ease;
      min-height: 56px;
    }

    .line-btn:active {
      transform: scale(0.98);
      filter: brightness(0.95);
    }

    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }

      .form {
        padding: 20px;
      }

      .grid-2 {
        gap: 12px;
      }

      .header h1 {
        font-size: 22px;
      }

      .label-lg {
        font-size: 17px;
      }

      .submit-btn,
      .line-btn {
        font-size: 18px;
      }

      .score-input {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>義朵朵pasta</h1>
      <p>顧客滿意度調查表</p>
    </div>

    <form id="surveyForm" class="form">
      <div class="grid-2">
        <div>
          <label class="label">👤 性別</label>
          <select name="gender" required class="select">
            <option value="" disabled selected>請選擇</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <div>
          <label class="label">🎂 年齡</label>
          <select name="ageGroup" required class="select">
            <option value="" disabled selected>請選擇</option>
            <option value="20歲以下">20歲以下</option>
            <option value="21-50歲">21-50歲</option>
            <option value="51歲以上">51歲以上</option>
          </select>
        </div>
      </div>

      <div class="grid-1">
        <div>
          <label class="label label-lg">📍 用餐分店</label>
          <select name="branch" required class="select" style="font-size:18px;">
            <option value="" disabled selected>請選擇分店</option>
            <option value="屏東中正店">屏東中正店</option>
            <option value="屏東福建店">屏東福建店</option>
            <option value="高雄文化店">高雄文化店</option>
          </select>
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label class="label">⏰ 時段</label>
          <select name="mealTime" required class="select">
            <option value="" disabled selected>請選擇</option>
            <option value="中午">中午</option>
            <option value="晚上">晚上</option>
          </select>
        </div>
        <div>
          <label class="label">📅 日期</label>
          <input type="date" id="visitDate" name="visitDate" required class="input" />
        </div>
      </div>

      <hr />

      <div>
        <label class="label label-lg">⭐ 評分 (請輸入 0-5 數字)</label>
        <input
          type="number"
          name="score"
          min="0"
          max="5"
          required
          placeholder="例如：5"
          class="input score-input"
        />
        <p class="hint">註：0分最不滿意，5分最滿意</p>
      </div>

      <div>
        <label class="label label-lg">💬 餐點名稱與建議</label>
        <textarea
          id="feedback"
          name="feedback"
          rows="4"
          required
          placeholder="請寫下您的餐點名稱或建議..."
          class="textarea"
        ></textarea>
      </div>

      <button type="submit" class="submit-btn">提交並開啟官方 LINE</button>
    </form>
  </div>

  <div id="successModal" class="modal">
    <div class="modal-card">
      <div class="success-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h3>已完成複製！</h3>
      <p>
        請前往 LINE 對話框<br />
        <strong class="highlight">長按「貼上」</strong>訊息傳送。
      </p>
      <button id="goToLineBtn" class="line-btn">開啟官方 LINE</button>
    </div>
  </div>

  <script>
    document.getElementById("visitDate").valueAsDate = new Date();

    document.getElementById("surveyForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const formData = new FormData(this);
      const gender = formData.get("gender");
      const ageGroup = formData.get("ageGroup");
      const branch = formData.get("branch");
      const mealTime = formData.get("mealTime");
      const visitDate = formData.get("visitDate");
      const score = formData.get("score");
      const feedback = formData.get("feedback");

      const message =
        `【義朵朵回饋調查】\n` +
        `👤 客人：${gender} / ${ageGroup}\n` +
        `📍 分店：${branch}\n` +
        `📅 日期：${visitDate}\n` +
        `⏰ 時段：${mealTime}\n` +
        `⭐ 評分：${score} 分\n` +
        `💬 內容：\n${feedback}`;

      copyToClipboard(message);
    });

    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(showModal)
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed";
      textArea.style.opacity = "0";
      textArea.style.left = "-9999px";
      textArea.style.top = "0";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      try {
        document.execCommand("copy");
      } catch (err) {}

      document.body.removeChild(textArea);
      showModal();
    }

    function showModal() {
      document.getElementById("successModal").classList.add("show");
    }

    document.getElementById("goToLineBtn").addEventListener("click", function () {
      window.location.href = "https://lin.ee/wPFddmn";
    });
  </script>
</body>
</html>

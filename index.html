<script>
  document.getElementById("visitDate").valueAsDate = new Date();

  document.getElementById("surveyForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const formData = new FormData(this);
    const gender = formData.get("gender");
    const ageGroup = formData.get("ageGroup");
    const branch = formData.get("branch");
    const mealTime = formData.get("mealTime");
    const visitDate = formData.get("visitDate");
    const score = formData.get("score");
    const feedback = formData.get("feedback");

    const message =
      `【義朵朵回饋調查】\n` +
      `👤 客人：${gender} / ${ageGroup}\n` +
      `📍 分店：${branch}\n` +
      `📅 日期：${visitDate}\n` +
      `⏰ 時段：${mealTime}\n` +
      `⭐ 評分：${score} / 5 分\n` +
      `💬 內容：${feedback}`;

    const lineId = "@109npnhy";
    const encodedMsg = encodeURIComponent(message);
    const lineUrl = `https://line.me/R/oaMessage/${lineId}/?${encodedMsg}`;

    window.location.href = lineUrl;
  });
</script>
